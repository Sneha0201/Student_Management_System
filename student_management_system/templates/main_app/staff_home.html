{% extends "main_app/base.html" %}
{% block content %}
<h2>Staff Dashboard</h2>
<h3>My Students</h3>
<table border="1">
    <tr>
        <th>Name</th>
        <th>Course</th>
        <th>Gender</th>
    </tr>
    {% for student in students %}
    <tr>
        <td>{{ student.student.username }}</td>
        <td>{{ student.course }}</td>
        <td>{{ student.gender }}</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
