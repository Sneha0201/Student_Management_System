<h2>Staff Dashboard</h2>
<h3>My Students</h3>
<table border="1">
    <tr>
        <th>Name</th>
        <th>Course</th>
        <th>Gender</th>
        <th>Address</th>
    </tr>
    {% for student in students %}
    <tr>
        <td>{{ student.student.username }}</td>
        <td>{{ student.course }}</td>
        <td>{{ student.gender }}</td>
        <td>{{ student.address }}</td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="4">No students assigned</td>
    </tr>
    {% endfor %}
</table>
<br>
<a href="{% url 'manage_student' %}">View My Student</a><br><br>
<a href="{% url 'logout' %}">Logout</a>
<a href="{% url 'staff_profile' %}">View My Profile</a><br><br>
