{% extends "main_app/base.html" %}
{% block content %}
<h2>Attendance Record</h2>
<table class="table table-bordered">
    <tr>
        <th>Student</th>
        <th>Attendance %</th>
    </tr>
    {% for s in student_data %}
    <tr>
        <td>{{ s.student.student.username }}</td>
        <td>{{ s.percentage }}</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
