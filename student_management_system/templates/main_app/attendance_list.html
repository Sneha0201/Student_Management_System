{% extends "main_app/base.html" %}
{% block content %}
<h2>Attendance Record</h2>
<table class="table table-striped table-bordered">
    <tr>
        <th>Student</th>
        <th>Date</th>
        <th>Status</th>
    </tr>
    {% for a in attendance_records %}
    <tr>
        <td>{{ a.student.student.username }}</td>
        <td>{{ a.date }}</td>
        <td>
            {% if a.status %}
            Present
            {% else %}
            Absent
            {% endif %}
        </td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
