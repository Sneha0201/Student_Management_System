<!DOCTYPE html>
<html>
<head>
    <title>Student Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .sidebar {
            height: 100vh;
            background-color: #343a40;
            color: white;
            padding: 20px;
        }
        .sidebar a {
            color: white;
            display: block;
            margin-bottom: 10px;
            text-decoration: none;
        }
        .sidebar a:hover {
            background-color: #495057;
            padding: 5px;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!--Sidebar-->
            <div class="col-md-2 sidebar">
                <h4>Dashboard</h4>
                <a href="{% url 'admin_home' %}">Admin</a>
                <a href="{% url 'add_staff' %}">Add Staff</a><br><br>
                <a href="{% url 'manage_staff' %}">Manage Staff</a><br><br>
                <a href="{% url 'add_student' %}">Add Student</a><br><br>
                <a href="{% url 'manage_student' %}">Manage Student</a><br><br>
                <a href="{% url 'attendance_list' %}">Attendance</a><br><br>
                <a href="{% url 'logout' %}">Logout</a>
            </div>
            <!--Main Content-->
            <div class="col-md-10 p-4">
                {% block content %}
                {% endblock %}
            </div>
        </div>
    </div>
</body>
</html>
